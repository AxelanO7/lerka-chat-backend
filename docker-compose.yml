version: "3.8"

services:
  api:
    build: .
    container_name: lerka-chat-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - lerka-network
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    container_name: lerka-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-lerka}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lerka-network

  redis:
    image: redis:7-alpine
    container_name: lerka-redis
    restart: always
    command: redis-server --maxmemory 1gb --maxmemory-policy volatile-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lerka-network

volumes:
  postgres_data:
  redis_data:

networks:
  lerka-network:
    driver: bridge
