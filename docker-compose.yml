version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lerka-backend
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=ollama
      # Use host.docker.internal to reach the Ollama service on your Windows host
      - OLLAMA_BASE_URL=http://localhost:11434
      - DEFAULT_MODEL=llama3
    # Removed depends_on: ollama
    networks:
      - lerka-network

networks:
  lerka-network:
    driver: bridge

# Removed volumes: ollama_data:
