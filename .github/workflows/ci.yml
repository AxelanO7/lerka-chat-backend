name: CI Check

on:
  pull_request:
    branches:
      - main
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import check
        run: python -c "from app.api.router import api_router; from app.core.config import settings; print('Import check passed')"
