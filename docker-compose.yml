version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lerka-backend
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=ollama
      # Use the docker service name as hostname
      - OLLAMA_BASE_URL=http://ollama:11434
      - DEFAULT_MODEL=llama3
    depends_on:
      - ollama
    networks:
      - lerka-network

  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: lerka-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - lerka-network

networks:
  lerka-network:
    driver: bridge

volumes:
  ollama_data:
