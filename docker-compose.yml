version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lerka-aichat-backend
    ports:
      - "127.0.0.1:3013:8000"
    env_file:
      - .env
    networks:
      - lerka-network

