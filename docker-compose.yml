version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lerka-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    # Removed depends_on: ollama
    networks:
      - lerka-network

  ngrok:
    image: ngrok/ngrok:latest
    container_name: lerka-ngrok-aichat
    ports:
      - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    command: http api:8000
    depends_on:
      - api
    networks:
      - lerka-network

networks:
  lerka-network:
    driver: bridge

# Removed volumes: ollama_data:
