version: "3.8"

services:
  api:
    build: .
    container_name: lerka-chat-backend
    ports:
      - "127.0.0.1:3016:8000"
    env_file:
      - .env
    networks:
      - lerka-network
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: lerka-mongodb
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USER:-root}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD:-example}
    volumes:
      - mongodb_data:/data/db
    networks:
      - lerka-network

volumes:
  mongodb_data:

networks:
  lerka-network:
    driver: bridge
