version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lerka-aichat-backend
    ports:
      - "127.0.0.1:3013:8000"
    env_file:
      - .env
    networks:
      - lerka-network
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    container_name: lerka-mongodb
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USER:-root}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD:-example}
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - lerka-network

